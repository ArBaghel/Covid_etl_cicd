version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt || true
  pre_build:
    commands:
      - echo "Validating syntax..."
      - python -m py_compile lambda_function.py lambda_fetch.py
  build:
    commands:
      - echo "Packaging Lambda functions..."
      - zip lambda_function.zip lambda_function.py
      - zip lambda_fetch.zip lambda_fetch.py
  post_build:
    commands:
      - echo "Deploying Lambda functions directly to AWS..."
      - aws lambda update-function-code --function-name covid-fetcher-lambda --zip-file fileb://lambda_fetch.zip
      - aws lambda update-function-code --function-name covid-parser-lambda --zip-file fileb://lambda_function.zip
      - echo "Deployment completed successfully!"

artifacts:
  files:
    - lambda_function.zip
    - lambda_fetch.zip
