version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt || true
  pre_build:
    commands:
      - echo "Validating syntax..."
      - python -m py_compile lambda_function.py lambda_json.py lambda_csv.py lambda_xml.py lambda_fetch.py
  build:
    commands:
      - echo "Packaging Lambda functions..."
      - zip lambda_router.zip lambda_function.py
      - zip lambda_json.zip lambda_json.py
      - zip lambda_csv.zip lambda_csv.py
      - zip lambda_xml.zip lambda_xml.py
      - zip lambda_fetch.zip lambda_fetch.py
  post_build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  files:
    - lambda_router.zip
    - lambda_json.zip
    - lambda_csv.zip
    - lambda_xml.zip
    - lambda_fetch.zip
